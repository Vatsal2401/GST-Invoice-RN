name: Build Android

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (APK — preview)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.profile == 'preview'
        run: eas build --platform android --profile preview --non-interactive

      - name: Build Android (AAB — production)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production'
        run: eas build --platform android --profile production --non-interactive
